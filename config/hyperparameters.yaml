# Hyperparameters for the WVC pipeline.
# Rewritten 2026-04-30 (Phase 5 Row 12) per architecture_map.md §5,
# replacing IDE-suggested noise with the notebook-faithful values from
# code/notebooks/test.ipynb cells 14 and 16. Amanda confirmed overwrite.

random_forest:
  n_estimators: 100
  class_weight: balanced
  random_state: 42
  n_jobs: -1
  # Note: max_depth, min_samples_split intentionally omitted — sklearn
  # defaults (None / 2) match the notebook.

logistic_regression:
  max_iter: 3000
  class_weight: balanced
  # No random_state — LR is deterministic given fixed input ordering.

calibration:
  method: isotonic
  cv: 3

# Preserved from the original YAML; not currently consumed by code, but
# documents the four focal species.
species:
  - moose
  - roe_deer
  - wild_boar
  - fallow_deer
